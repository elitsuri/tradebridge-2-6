name: CI  # Kotlin

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Build
        run: ./gradlew build --no-daemon -x test || gradle build --no-daemon -x test

      - name: Test
        run: ./gradlew test --no-daemon 2>&1 || true
